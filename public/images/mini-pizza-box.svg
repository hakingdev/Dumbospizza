<svg viewBox="0 0 820 640" xmlns="http://www.w3.org/2000/svg">
  <!-- 4er Mini Pizza Box: offene Schachtel mit 4 Mini-Pizzen (Flat-Stil wie pizza-format.png) -->
  <defs>
    <radialGradient id="dough" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#fbe28a"/>
      <stop offset="72%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#eabd4b"/>
    </radialGradient>
    <linearGradient id="boxIn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9a761"/>
      <stop offset="100%" stop-color="#c08a45"/>
    </linearGradient>
    <linearGradient id="boxEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b57f3e"/>
      <stop offset="100%" stop-color="#9c6a2f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#7c4a12" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Schachtel -->
  <g filter="url(#soft)">
    <rect x="90" y="80" width="640" height="500" rx="46" fill="url(#boxEdge)"/>
    <rect x="106" y="96" width="608" height="468" rx="36" fill="url(#boxIn)"/>
    <rect x="106" y="96" width="608" height="468" rx="36" fill="none" stroke="#8a5a24" stroke-opacity="0.35" stroke-width="4"/>
  </g>

  <!-- 4 Mini-Pizzen -->
  <g>
    <!-- Margherita -->
    <g transform="translate(258,222)">
      <circle r="118" fill="#d9903c"/>
      <circle r="102" fill="url(#dough)"/>
      <circle r="98" fill="#e8595a" opacity="0.85"/>
      <circle r="88" fill="url(#dough)"/>
      <circle cx="-32" cy="-24" r="20" fill="#fff5d6" opacity="0.9"/>
      <circle cx="26" cy="8" r="24" fill="#fff5d6" opacity="0.9"/>
      <circle cx="-6" cy="44" r="17" fill="#fff5d6" opacity="0.9"/>
      <path d="M -8 -50 q 10 -12 22 -4 q -12 2 -14 12 q -8 -2 -8 -8 Z" fill="#3f9142"/>
      <path d="M 44 -30 q 10 -12 22 -4 q -12 2 -14 12 q -8 -2 -8 -8 Z" fill="#3f9142"/>
    </g>
    <!-- Salami -->
    <g transform="translate(562,222)">
      <circle r="118" fill="#d9903c"/>
      <circle r="102" fill="url(#dough)"/>
      <circle cx="-34" cy="-28" r="21" fill="#c8403f"/>
      <circle cx="30" cy="-34" r="19" fill="#c8403f"/>
      <circle cx="-8" cy="12" r="22" fill="#c8403f"/>
      <circle cx="48" cy="26" r="18" fill="#c8403f"/>
      <circle cx="-48" cy="34" r="17" fill="#c8403f"/>
      <circle cx="-30" cy="-24" r="4" fill="#8f2b2a"/>
      <circle cx="34" cy="-30" r="4" fill="#8f2b2a"/>
      <circle cx="-4" cy="16" r="4" fill="#8f2b2a"/>
    </g>
    <!-- Funghi -->
    <g transform="translate(258,462)">
      <circle r="118" fill="#d9903c"/>
      <circle r="102" fill="url(#dough)"/>
      <g fill="#e9dcc8" stroke="#c9b08c" stroke-width="3">
        <path d="M -42 -18 a 14 14 0 1 1 28 0 l -4 22 h -20 Z"/>
        <path d="M 18 -34 a 14 14 0 1 1 28 0 l -4 22 h -20 Z"/>
        <path d="M -6 26 a 14 14 0 1 1 28 0 l -4 22 h -20 Z"/>
      </g>
      <path d="M -52 40 q 10 -12 22 -4 q -12 2 -14 12 q -8 -2 -8 -8 Z" fill="#3f9142"/>
    </g>
    <!-- Paprika/Oliven -->
    <g transform="translate(562,462)">
      <circle r="118" fill="#d9903c"/>
      <circle r="102" fill="url(#dough)"/>
      <g fill="none" stroke="#3f9142" stroke-width="9" stroke-linecap="round">
        <path d="M -44 -20 a 20 20 0 1 0 2 -2"/>
        <path d="M 24 -30 a 20 20 0 1 0 2 -2"/>
      </g>
      <circle cx="-6" cy="22" r="12" fill="#37342f"/>
      <circle cx="42" cy="34" r="12" fill="#37342f"/>
      <circle cx="-48" cy="40" r="12" fill="#37342f"/>
      <circle cx="-3" cy="19" r="4" fill="#6b675f"/>
      <circle cx="45" cy="31" r="4" fill="#6b675f"/>
    </g>
  </g>
</svg>
